name: Block-Level-Tests

on:
  push:
    branches: [main, pipelineV]
  pull_request:

jobs:
  Block-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Cache apt packages
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-verilator-${{ runner.os }}-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            apt-verilator-${{ runner.os }}-

      - name: Install Verilator build dependencies
        if: steps.cache-verilator.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git help2man perl make autoconf \
            g++ flex bison libfl2 libfl-dev zlib1g zlib1g-dev

      - name: Cache Verilator build
        id: cache-verilator
        uses: actions/cache@v4
        with:
          path: ~/verilator
          key: verilator-${{ runner.os }}-v5.048

      - name: Build Verilator from source
        if: steps.cache-verilator.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/verilator/verilator.git
          cd verilator
          git checkout v5.048
          autoconf
          ./configure --prefix=$HOME/verilator
          make -j$(nproc)
          make install

      - name: Add Verilator to PATH
        run: echo "$HOME/verilator/bin" >> $GITHUB_PATH
    
      - name: Run Decoder tests
        run: |
          cd test/decoder && WAVES=0 pytest test_runner_decoder.py

      - name: Run Reg-file tests
        run: |
          cd test/reg_file && WAVES=0 pytest tests_reg_file.py

      - name: Run Program-counter tests
        run: |
          cd test/program_counter && WAVES=0 pytest tests_program_counter.py

      - name: Run CSR tests
        run: |
          cd test/csr && WAVES=0 pytest tests_csr.py

      - name: Run INST MEM tests
        run: |
          cd test/inst_mem && WAVES=0 pytest tests_inst_mem.py

      - name: Run Data MEM tests
        run: |
          cd test/data_mem && WAVES=0 pytest tests_data_mem.py

      - name: Run ALU tests
        run: |
          cd test/ALU && WAVES=0 pytest tests_alu.py
      
      - name: Run Reg-file-V2 tests
        run: |
          cd test/reg_file_v2 && pytest tests_reg_file_v2.py